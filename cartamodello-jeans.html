<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartamodello Pantalone Jeans — Taglie 38–48</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1521;--panel:#0f1e30;--paper:#f5ece0;--ink:#1c1108;
  --gold:#c9a857;--gd:rgba(201,168,87,.22);--gf:rgba(201,168,87,.08);
  --tx:#9dbbd8;--txd:rgba(157,187,216,.42);
  --c38:#e74c3c;--c40:#e07a28;--c42:#27ae60;--c44:#2980e0;--c46:#8e40cc;--c48:#d6338f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;font-size:13px;padding:20px 18px;line-height:1.5;min-height:100vh}

.hdr{text-align:center;padding:26px 0 20px;border-bottom:1px solid var(--gd);margin-bottom:26px}
.hdr-t{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase;line-height:1.1}
.hdr-t span{display:block;font-size:1.45rem;font-weight:500;letter-spacing:6px;margin-top:4px;color:rgba(201,168,87,.72)}
.hdr-m{margin-top:9px;font-size:.67rem;letter-spacing:2.5px;color:var(--txd);text-transform:uppercase}

.ctrl{display:flex;justify-content:center;gap:8px;margin-bottom:26px;flex-wrap:wrap;align-items:center}
.btn-all{padding:6px 14px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:1px;cursor:pointer;transition:all .15s;border-radius:2px}
.btn-all:hover,.btn-all.active{background:var(--gold);color:var(--bg)}
.sep{width:1px;height:28px;background:var(--gd);margin:0 4px}
.btn-sz{padding:6px 14px;background:transparent;border:2px solid;font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;border-radius:2px;opacity:.42}
.btn-sz.on{opacity:1}

.psec{display:flex;flex-direction:column;gap:18px;align-items:center;margin-bottom:36px}
.prow{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;width:100%}
.pwrap{display:flex;flex-direction:column;align-items:center}
.pcard{background:var(--paper);border:1px solid rgba(201,168,87,.28);padding:14px 12px 12px;position:relative;box-shadow:0 6px 28px rgba(0,0,0,.55)}
.pcard::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(180,160,130,.17) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,130,.17) 1px,transparent 1px);background-size:10px 10px}
.badge{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#f5ece0;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2;border:1px solid rgba(200,160,80,.4)}
.pname{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--tx);text-align:center;margin-top:9px;letter-spacing:1px}
.psub{font-size:.6rem;color:var(--txd);text-align:center;margin-top:3px;letter-spacing:.4px}

.box{border:1px solid var(--gd);padding:22px 24px;margin-bottom:22px;background:var(--panel)}
.stitle{font-family:'Cormorant Garamond',serif;font-size:1.22rem;font-weight:600;color:var(--gold);margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--gd);letter-spacing:2px}
.lcols{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:22px}
.lgt{font-size:.63rem;letter-spacing:3px;text-transform:uppercase;color:var(--txd);margin-bottom:10px}
.li{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:.71rem;line-height:1.45}

.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.7rem}
th{background:var(--gf);padding:9px 12px;text-align:center;border:1px solid rgba(201,168,87,.12);color:var(--gold);font-weight:700;letter-spacing:.8px}
td{padding:7px 12px;text-align:center;border:1px solid rgba(255,255,255,.04);color:var(--tx)}
td.rl{text-align:left;color:var(--txd)}
tr:hover td{background:rgba(255,255,255,.015)}

.notes{margin-top:22px;font-size:.67rem;line-height:2.1;color:var(--txd);border-top:1px solid var(--gd);padding-top:16px}
.notes strong{color:var(--gold)}
footer{text-align:center;margin-top:30px;padding-top:14px;border-top:1px solid var(--gd);font-size:.61rem;color:var(--txd);letter-spacing:1.5px}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-t">Cartamodello<span>Pantalone Jeans</span></div>
  <div class="hdr-m">Scala 1:5 &nbsp;·&nbsp; Taglie 38–48 &nbsp;·&nbsp; Margine cucitura 1 cm incluso &nbsp;·&nbsp; 6 pezzi &nbsp;·&nbsp; Denim elasticizzato 2–4% Lycra</div>
</header>
<div class="ctrl" id="ctrl"></div>
<div class="psec" id="psec"></div>
<div class="box">
  <div class="stitle">📐 Legenda del Cartamodello</div>
  <div class="lcols" id="lcols"></div>
</div>
<div class="box">
  <div class="stitle">📏 Tabella Misure Finite (cm)</div>
  <div class="tw"><table id="tbl"></table></div>
</div>
<div class="notes" id="notes"></div>
<footer>CARTAMODELLO PANTALONE JEANS &nbsp;·&nbsp; Taglie 38–48 &nbsp;·&nbsp; © Uso Sartoriale 2024</footer>

<script>
const SZ=[38,40,42,44,46,48];
const CL=['#e74c3c','#e07a28','#27ae60','#2980e0','#8e40cc','#d6338f'];
const DA=[null,'6,3.5',null,'6,3.5',null,'4,2.5'];
// sizes 38,46 solid; 40,44 dash; 42 solid+thick; 48 short-dash
const SW=[1.6,1.5,2.5,1.5,1.6,1.5];
const WF=SZ.map((_,i)=>+(1+(i-2)*0.05).toFixed(3));
const LF=SZ.map((_,i)=>+(1+(i-2)*0.01).toFixed(3));
let ACT=new Set([0,1,2,3,4,5]);

const f=(x,y)=>`${+x.toFixed(1)},${+y.toFixed(1)}`;

/* ─── PATH GENERATORS ─── */
function davPath(wf,lf){
  const H=238*lf,R=70*lf,K=R+90*lf,cx=52;
  const hw=29*wf,hh=38*wf,hk=28*wf,he=25.5*wf,ce=10*wf;
  const sw=cx-hw,sh=cx-hh,sk=cx-hk,se=cx-he;
  const iw=cx+hw,ik=cx+hk,ie=cx+he;
  const cX=iw+ce,hipY=R*0.46;
  return `M${f(sw,2)}L${f(iw,0)}C${f(cX,R*.32)} ${f(cX-1,R*.76)} ${f(iw-1,R)}L${f(ik,K)}L${f(ie,H)}L${f(se,H)}L${f(sk,K)}C${f(sh-5.5*wf,hipY)} ${f(sw,.4*hipY)} ${f(sw,2)}Z`;
}

function detPath(wf,lf){
  const H=238*lf,R=88*lf,K=R+86*lf,cx=55;
  const hwW=28.5*wf,hwH=44*wf,hk=30*wf,he=27.5*wf,ce=23*wf;
  const sw=cx-hwW+3.5*wf,sh=cx-hwH,sk=cx-hk,se=cx-he;
  const iw=cx+hwW-3.5*wf,ik=cx+hk,ie=cx+he;
  const cX=iw+ce,hipY=R*0.41;
  return `M${f(sw,13)}L${f(iw,0)}C${f(cX,R*.22)} ${f(cX+5,R*.60)} ${f(iw+3.5,R)}L${f(ik,K)}L${f(ie,H)}L${f(se,H)}L${f(sk,K)}C${f(sh-6*wf,hipY)} ${f(sw-4*wf,hipY*.28)} ${f(sw,13)}Z`;
}
function detDart(wf,lf){
  const iw=55+28.5*wf-3.5*wf,dX=iw-9*wf,dH=15*lf;
  return `M${f(dX-3*wf,0)}L${f(dX,dH)}L${f(dX+3*wf,0)}`;
}

function cinPath(wf){
  const W=222*wf,x=14,y=5;return `M${f(x,y)}L${f(x+W,y)}L${f(x+W,y+38)}L${f(x,y+38)}Z`;
}
function cinFold(wf){
  const W=222*wf,x=14,mid=24;return `M${f(x,mid)}L${f(x+W,mid)}`;
}

function taPath(wf,lf){
  const W=76*wf,H=116*lf,x0=12,y0=8;
  return `M${f(x0,y0)}L${f(x0+W,y0)}Q${f(x0+W+9*wf,H*.35)} ${f(x0+W,y0+H)}Q${f(x0+W*.5,y0+H+8*lf)} ${f(x0,y0+H)}Z`;
}

function tpPath(wf,lf){
  const W=78*wf,H=86*lf,r=7*wf,x=10,y=10;
  return `M${f(x+r,y)}L${f(x+W-r,y)}Q${f(x+W,y)} ${f(x+W,y+r)}L${f(x+W,y+H-r)}Q${f(x+W,y+H)} ${f(x+W-r,y+H)}L${f(x+r,y+H)}Q${f(x,y+H)} ${f(x,y+H-r)}L${f(x,y+r)}Q${f(x,y)} ${f(x+r,y)}Z`;
}
function tpV(wf,lf){
  const W=78*wf,x=10,y=10,mid=x+W/2;
  return `M${f(x+8*wf,y+8)}L${f(mid,y+30*lf)}L${f(x+W-8*wf,y+8)}`;
}

function moPath(wf,lf){
  const W=36*wf,H=102*lf,x=10,y=7;
  return `M${f(x,y)}L${f(x+W,y)}C${f(x+W+7*wf,H*.45)} ${f(x+W+5*wf,H*.82)} ${f(x+W*.62,y+H)}L${f(x,y+H)}Z`;
}

const PIECES=[
  {id:'dav',n:1,name:'DAVANTI',sub:'Pezzo 1 — × 2 specchiato',vb:'0 0 120 270',mw:150,
   pf:davPath,extras:[],
   grain:{x1:52,y1:18,x2:52,y2:246},
   notches:[{x1:20,y1:32,x2:32,y2:32},{x1:79,y1:70,x2:91,y2:70},{x1:23,y1:158,x2:35,y2:158},{x1:76,y1:158,x2:88,y2:158}]},
  {id:'det',n:2,name:'DIETRO',sub:'Pezzo 2 — × 2 specchiato',vb:'0 0 145 278',mw:160,
   pf:detPath,extras:[{fn:detDart,st:'#666',sw:1.1,da:'4,2.5',tt:'Pince vita'}],
   grain:{x1:55,y1:22,x2:55,y2:252},
   notches:[{x1:18,y1:36,x2:30,y2:36},{x1:92,y1:88,x2:104,y2:88},{x1:25,y1:165,x2:37,y2:165},{x1:82,y1:165,x2:94,y2:165}]},
  {id:'cin',n:3,name:'CINTURA',sub:'Pezzo 3 — × 1 (piega)',vb:'0 0 280 50',mw:320,
   pf:(w,l)=>cinPath(w),extras:[{fn:(w,l)=>cinFold(w),st:'#aaa',sw:.9,da:'5,3',tt:'Linea di piega'}],
   grain:{x1:30,y1:24,x2:244,y2:24},
   notches:[{x1:70,y1:5,x2:70,y2:14},{x1:70,y1:36,x2:70,y2:45},{x1:178,y1:5,x2:178,y2:14},{x1:178,y1:36,x2:178,y2:45}]},
  {id:'taa',n:4,name:'BOLSA TASCA ANT.',sub:'Pezzo 4 — × 2',vb:'0 0 105 138',mw:130,
   pf:taPath,extras:[],grain:{x1:50,y1:16,x2:50,y2:122}},
  {id:'tap',n:5,name:'TASCA POSTERIORE',sub:'Pezzo 5 — × 2',vb:'0 0 100 106',mw:130,
   pf:tpPath,extras:[{fn:tpV,st:'#888',sw:1.1,da:'3,2',tt:'Impuntura V decorativa'}],
   grain:{x1:49,y1:18,x2:49,y2:92}},
  {id:'mos',n:6,name:'MOSCA (Paranchi)',sub:'Pezzo 6 — × 2',vb:'0 0 60 118',mw:100,
   pf:moPath,extras:[],grain:{x1:29,y1:15,x2:29,y2:100}}
];

/* ─── BUILD SVG ─── */
function buildSVG(pc){
  const [,, vw,vh]=pc.vb.split(' ').map(Number);
  const sc=pc.mw/vw,dW=Math.round(vw*sc),dH=Math.round(vh*sc);
  let s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${pc.vb}" width="${dW}" height="${dH}" style="display:block">
<defs>
<marker id="aF${pc.id}" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto"><path d="M0,0.5 L5.5,3 L0,5.5Z" fill="#5a5a5a"/></marker>
<marker id="aB${pc.id}" markerWidth="6" markerHeight="6" refX="0.5" refY="3" orient="auto-start-reverse"><path d="M0,0.5 L5.5,3 L0,5.5Z" fill="#5a5a5a"/></marker>
</defs>`;
  // Draw from largest (i=5) to smallest (i=0) so smallest sits on top
  for(let i=5;i>=0;i--){
    if(!ACT.has(i))continue;
    const d=pc.pf(WF[i],LF[i]);
    const da=DA[i]?`stroke-dasharray="${DA[i]}"` : '';
    s+=`<path d="${d}" fill="none" stroke="${CL[i]}" stroke-width="${SW[i]}" ${da} stroke-linecap="round" stroke-linejoin="round"><title>Taglia ${SZ[i]}</title></path>`;
  }
  // Extras (only for base T.42)
  if(ACT.has(2)) pc.extras.forEach(e=>{
    const d2=e.fn(WF[2],LF[2]);
    const da2=e.da?`stroke-dasharray="${e.da}"` : '';
    s+=`<path d="${d2}" fill="none" stroke="${e.st}" stroke-width="${e.sw}" ${da2} stroke-linecap="round"><title>${e.tt||''}</title></path>`;
  });
  // Grain
  const g=pc.grain;
  s+=`<line x1="${g.x1}" y1="${g.y1}" x2="${g.x2}" y2="${g.y2}" stroke="#5a5a5a" stroke-width="1" marker-start="url(#aB${pc.id})" marker-end="url(#aF${pc.id})"/>`;
  // Notches
  if(pc.notches) pc.notches.forEach(n=>s+=`<line x1="${n.x1}" y1="${n.y1}" x2="${n.x2}" y2="${n.y2}" stroke="#3a3a3a" stroke-width="1.7"/>`);
  s+=`</svg>`;
  return s;
}

/* ─── RENDER ─── */
function renderCtrl(){
  const el=document.getElementById('ctrl');el.innerHTML='';
  const ba=document.createElement('button');
  ba.className='btn-all'+(ACT.size===6?' active':'');
  ba.textContent=ACT.size===6?'Nascondi tutte':'Mostra tutte';
  ba.onclick=()=>{ACT.size===6?ACT.clear():SZ.forEach((_,i)=>ACT.add(i));render()};
  el.appendChild(ba);
  const sep=document.createElement('div');sep.className='sep';el.appendChild(sep);
  SZ.forEach((sz,i)=>{
    const on=ACT.has(i);
    const b=document.createElement('button');
    b.className='btn-sz'+(on?' on':'');
    b.style.cssText=`border-color:${CL[i]};color:${on?'#fff':CL[i]};background:${on?CL[i]+'44':'transparent'}`;
    b.textContent=sz;
    b.onclick=()=>{ACT.has(i)?ACT.delete(i):ACT.add(i);render()};
    el.appendChild(b);
  });
}

function renderPieces(){
  const sec=document.getElementById('psec');sec.innerHTML='';
  const rowMn=document.createElement('div');rowMn.className='prow';
  const rowCin=document.createElement('div');rowCin.className='prow';
  const rowSm=document.createElement('div');rowSm.className='prow';
  PIECES.forEach(pc=>{
    const wrap=document.createElement('div');wrap.className='pwrap';
    const card=document.createElement('div');card.className='pcard';
    card.innerHTML=`<div class="badge">${pc.n}</div>`+buildSVG(pc);
    const nm=document.createElement('div');nm.className='pname';nm.textContent=pc.name;
    const sb=document.createElement('div');sb.className='psub';sb.textContent=pc.sub;
    wrap.appendChild(card);wrap.appendChild(nm);wrap.appendChild(sb);
    if(pc.id==='dav'||pc.id==='det') rowMn.appendChild(wrap);
    else if(pc.id==='cin') rowCin.appendChild(wrap);
    else rowSm.appendChild(wrap);
  });
  sec.appendChild(rowMn);sec.appendChild(rowCin);sec.appendChild(rowSm);
}

function render(){renderCtrl();renderPieces();}

/* ─── LEGEND ─── */
function renderLeg(){
  const el=document.getElementById('lcols');

  let c1=`<div><div class="lgt">Taglie &amp; Colori</div>`;
  SZ.forEach((sz,i)=>{
    const da=DA[i]?`stroke-dasharray="${DA[i]}"` : '';
    c1+=`<div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><line x1="2" y1="8" x2="42" y2="8" stroke="${CL[i]}" stroke-width="${i===2?2.5:1.8}" ${da}/></svg>
      <span><strong style="color:${CL[i]}">T.${sz}</strong> &nbsp;Vita ${74+(i-2)*2} / Fianchi ${98+(i-2)*2} cm</span></div>`;
  });
  c1+=`</div>`;

  const c2=`<div><div class="lgt">Tipi di Linea</div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><line x1="2" y1="8" x2="42" y2="8" stroke="#2a2a2a" stroke-width="2.5"/></svg><span>Linea di taglio — T.42 base (solida spessa)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><line x1="2" y1="8" x2="42" y2="8" stroke="#555" stroke-width="1.8" stroke-dasharray="7,3.5"/></svg><span>Linea di taglio — taglie adiacenti (tratto)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0">
      <defs><marker id="aF-lg" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M0,0.5L5,2.5L0,4.5Z" fill="#666"/></marker>
      <marker id="aB-lg" markerWidth="5" markerHeight="5" refX=".5" refY="2.5" orient="auto-start-reverse"><path d="M0,0.5L5,2.5L0,4.5Z" fill="#666"/></marker></defs>
      <line x1="3" y1="8" x2="41" y2="8" stroke="#666" stroke-width="1" marker-start="url(#aB-lg)" marker-end="url(#aF-lg)"/>
    </svg><span>Dritto filo (freccia doppia ↕)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><line x1="22" y1="2" x2="22" y2="14" stroke="#3a3a3a" stroke-width="2"/><line x1="15" y1="8" x2="29" y2="8" stroke="#3a3a3a" stroke-width="1"/></svg><span>Tacca di riscontro ⊥ (allineamento)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><line x1="2" y1="8" x2="42" y2="8" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/></svg><span>Linea di piega / impuntura decorativa</span></div>
  </div>`;

  const c3=`<div><div class="lgt">Simboli</div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><rect x="3" y="4" width="38" height="8" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="5,2.5"/></svg><span>Piega del tessuto (non tagliare)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><path d="M8,13 L22,4 L36,13" fill="none" stroke="#555" stroke-width="1.4" stroke-dasharray="3,2"/></svg><span>Pince / dartino (cucire, pressare a lato)</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><path d="M4,13 L22,4 L40,13" fill="none" stroke="#aaa" stroke-width="1.2"/><path d="M10,13 L22,7 L34,13" fill="none" stroke="#aaa" stroke-width="1.2"/></svg><span>Impuntura V su tasca posteriore</span></div>
    <div class="li"><svg viewBox="0 0 44 16" width="44" height="16" style="flex-shrink:0"><circle cx="22" cy="8" r="4.5" fill="none" stroke="#555" stroke-width="1.2"/><line x1="22" y1="4" x2="22" y2="12" stroke="#555" stroke-width=".9"/><line x1="17.5" y1="8" x2="26.5" y2="8" stroke="#555" stroke-width=".9"/></svg><span>Punto pivot / angolo cucitura</span></div>
  </div>`;

  const c4=`<div><div class="lgt">Ordine di Montaggio</div>
    <div class="li" style="display:block;line-height:2.05">
      <span style="color:var(--gold);font-weight:700">①</span> Applicare tasca posteriore su pannello dietro<br>
      <span style="color:var(--gold);font-weight:700">②</span> Cucire mosca (zip) su davanti SX<br>
      <span style="color:var(--gold);font-weight:700">③</span> Unire fianco destro e sinistro (side seam)<br>
      <span style="color:var(--gold);font-weight:700">④</span> Cucire cavallo: prima interno, poi esterno<br>
      <span style="color:var(--gold);font-weight:700">⑤</span> Montare paranchi / terminare zip<br>
      <span style="color:var(--gold);font-weight:700">⑥</span> Applicare cintura e passanti (× 5–7)<br>
      <span style="color:var(--gold);font-weight:700">⑦</span> Orlo a macchina (impuntura doppia 6 mm)
    </div>
  </div>`;
  el.innerHTML=c1+c2+c3+c4;
}

/* ─── TABLE ─── */
const ROWS=[
  ['Girovita (cm)',            SZ.map((_,i)=>74+(i-2)*2)],
  ['Giro fianchi (cm)',        SZ.map((_,i)=>98+(i-2)*2)],
  ['Giro coscia (cm)',         SZ.map((_,i)=>+(58+(i-2)*1.5).toFixed(1))],
  ['Giro ginocchio (cm)',      SZ.map((_,i)=>+(44+(i-2)*1).toFixed(1))],
  ['Larghezza orlo (cm)',      SZ.map((_,i)=>+(40+(i-2)*0.8).toFixed(1))],
  ['Cavallo anteriore (cm)',   SZ.map((_,i)=>+(28+(i-2)*0.5).toFixed(1))],
  ['Cavallo posteriore (cm)',  SZ.map((_,i)=>+(34+(i-2)*0.5).toFixed(1))],
  ['Lung. costura interna (cm)',SZ.map((_,i)=>+(78+(i-2)*0.5).toFixed(1))],
  ['Lunghezza totale (cm)',    SZ.map((_,i)=>106+(i-2)*1)],
  ['Larghezza cintura (cm)',   SZ.map((_,i)=>74+(i-2)*2)],
  ['Altezza cintura (cm)',     SZ.map(()=>4)],
];
function renderTbl(){
  const t=document.getElementById('tbl');
  let h=`<thead><tr><th>Misura</th>`;
  SZ.forEach((sz,i)=>h+=`<th style="color:${CL[i]}">${sz}</th>`);
  h+=`</tr></thead><tbody>`;
  ROWS.forEach(([l,vals])=>{
    h+=`<tr><td class="rl">${l}</td>`;
    vals.forEach(v=>h+=`<td>${v}</td>`);
    h+=`</tr>`;
  });
  h+=`</tbody>`;
  t.innerHTML=h;
}

/* ─── NOTES ─── */
function renderNotes(){
  document.getElementById('notes').innerHTML=`
    <strong>※</strong> Il <strong>margine di cucitura è già incluso</strong> in tutte le linee di taglio (1 cm), eccetto l'orlo inferiore (2 cm).<br>
    <strong>※</strong> I pezzi <strong>DAVANTI</strong> e <strong>DIETRO</strong> si tagliano × 2: tagliare il primo, poi capovolgere il cartamodello per ricavare il simmetrico.<br>
    <strong>※</strong> Calibrato per <strong>denim elasticizzato 2–4% Lycra</strong>. Per denim rigido aumentare fianchi e vita di +1 cm per taglia.<br>
    <strong>※</strong> Le <strong>tacche ⊥</strong> vanno fatte coincidere tra i pezzi durante il montaggio (tacche doppie al cavallo, singole al fianco).<br>
    <strong>※</strong> <strong>T.42 base</strong> (linea verde spessa continua): tutte le misure in tabella si riferiscono al capo finito cucito.<br>
    <strong>※</strong> Pre-lavare sempre il denim a 60°C per compensare il <strong>restringimento</strong> prima di tagliare.<br>
    <strong>※</strong> <strong>Cintura</strong>: tagliare sul dritto filo lungo, piegare a metà. Lato piega = bordo inferiore della cintura finita.`;
}

/* ─── INIT ─── */
render();
renderLeg();
renderTbl();
renderNotes();
</script>
