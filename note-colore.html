<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcolatore Note Colore Tessili</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 30px;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 20px;
      margin-bottom: 20px;
    }

    textarea, input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1f2937;
    }

    .section {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .section h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .mono {
      font-family: Consolas, monospace;
      word-break: break-word;
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #dbeafe;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #64748b;
      text-transform: uppercase;
    }

    .card p {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calcolatore Note Colore Tessili</h1>

    <p class="small">
      Inserisci la nota nel formato: <b>88B-22C-14A</b>
    </p>

    <div class="grid">
      <textarea id="nota" rows="4">88B-22C-14A-28B-12A-18D-14A-16D-10C-16D-14A-18D-12A-28B-14A-22C</textarea>

      <div>
        <input type="number" id="fo" placeholder="FO" value="3628" />
        <br><br>
        <button onclick="calcola()">Calcola</button>
      </div>
    </div>

    <div id="output"></div>
  </div>

  <script>
    function parseNota(str) {
      return str
        .split('-')
        .map(item => {
          const match = item.trim().match(/(\d+)([A-Za-z]+)/);
          if (!match) return null;

          return {
            qty: parseInt(match[1]),
            color: match[2]
          };
        })
        .filter(Boolean);
    }

    function notaToString(nota) {
      return nota.map(n => `${n.qty}${n.color}`).join('-');
    }

    function totaleNota(nota) {
      return nota.reduce((sum, n) => sum + n.qty, 0);
    }

    function rendiSimmetrica(nota) {
      const prima = nota[0];
      const meta = prima.qty / 2;

      const nuova = [
        { qty: meta, color: prima.color },
        ...nota.slice(1),
        { qty: meta, color: prima.color }
      ];

      return nuova;
    }

    function trovaNuovaPartenza(nota, offset) {
      let accumulo = 0;

      for (let i = 0; i < nota.length; i++) {
        const blocco = nota[i];

        if (accumulo + blocco.qty >= offset) {
          const consumati = offset - accumulo;
          const restanti = blocco.qty - consumati;

          const finale = [];

          if (restanti > 0) {
            finale.push({
              qty: restanti,
              color: blocco.color
            });
          }

          for (let j = i + 1; j < nota.length; j++) {
            finale.push(nota[j]);
          }

          for (let j = 0; j < i; j++) {
            finale.push(nota[j]);
          }

          if (consumati > 0) {
            finale.push({
              qty: consumati,
              color: blocco.color
            });
          }

          return {
            consumati,
            restanti,
            bloccoOriginale: blocco,
            nuovaNota: finale
          };
        }

        accumulo += blocco.qty;
      }

      return null;
    }

    function calcola() {
      const notaInput = document.getElementById('nota').value;
      const fo = parseInt(document.getElementById('fo').value);

      const notaOriginale = parseNota(notaInput);
      const notaSimmetrica = rendiSimmetrica(notaOriginale);

      const totale = totaleNota(notaSimmetrica);

      const ripetizioni = Math.floor(fo / totale);
      const rapporto = fo / totale;

      const resto = fo - (totale * ripetizioni);
      const centratura = resto / 2;

      const risultatoPartenza = trovaNuovaPartenza(notaSimmetrica, centratura);

      const output = document.getElementById('output');

      output.innerHTML = `
        <div class="section">
          <h2>Nota Simmetrica</h2>
          <div class="mono">${notaToString(notaSimmetrica)}</div>
        </div>

        <div class="stats">
          <div class="card">
            <h3>Totale Nota</h3>
            <p>${totale}</p>
          </div>

          <div class="card">
            <h3>Ripetizioni</h3>
            <p>${ripetizioni}</p>
          </div>

          <div class="card">
            <h3>Rapporto</h3>
            <p>${rapporto.toFixed(2)}</p>
          </div>

          <div class="card">
            <h3>Resto</h3>
            <p>${resto}</p>
          </div>

          <div class="card">
            <h3>Centratura</h3>
            <p>${centratura}</p>
          </div>
        </div>

        <div class="section">
          <h2>Dettaglio Spezzatura</h2>
          <div class="mono">
            Blocco spezzato: ${risultatoPartenza.bloccoOriginale.qty}${risultatoPartenza.bloccoOriginale.color}<br>
            Fili consumati: ${risultatoPartenza.consumati}${risultatoPartenza.bloccoOriginale.color}<br>
            Fili restanti: ${risultatoPartenza.restanti}${risultatoPartenza.bloccoOriginale.color}
          </div>
        </div>

        <div class="section">
          <h2>Nuova Partenza Centrata</h2>
          <div class="mono">
            ${notaToString(risultatoPartenza.nuovaNota)}
          </div>
        </div>
      `;
    }

    calcola();
  </script>
</body>
</html>
