<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#08110c"/>
  <meta name="robots" content="index, follow"/>
  <title>Scheda Progetto | Ronaldo Riska Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="site.css"/>
  <link rel="stylesheet" href="site-patch.css"/>
  <style>
    /* ── Scheda Progetto — stili specifici ── */
    .scheda-breadcrumb{
      font-size:12px;color:var(--muted,rgba(238,242,238,.4));
      margin-bottom:28px;font-family:'JetBrains Mono',monospace;
    }
    .scheda-breadcrumb a{color:var(--muted,rgba(238,242,238,.4));text-decoration:none}
    .scheda-breadcrumb a:hover{color:var(--accent,#c9a84c);text-decoration:none}
    .scheda-breadcrumb span{margin:0 6px;opacity:.5}

    .scheda-hero{margin-bottom:36px}
    .scheda-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .scheda-badge{
      display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;
      font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
      font-family:'JetBrains Mono',monospace;
    }
    .badge-area  {background:rgba(201,168,76,.15); color:#c9a84c;  border:1px solid rgba(201,168,76,.3)}
    .badge-tipo  {background:rgba(46,196,160,.12);  color:#2ec4a0;  border:1px solid rgba(46,196,160,.25)}
    .badge-live  {background:rgba(61,184,122,.12);  color:#3db87a;  border:1px solid rgba(61,184,122,.25)}
    .badge-draft {background:rgba(249,115,22,.12);  color:#f97316;  border:1px solid rgba(249,115,22,.25)}
    .badge-anno  {background:rgba(255,255,255,.06); color:rgba(238,242,238,.4); border:1px solid rgba(255,255,255,.1)}

    .scheda-hero h1{
      font-size:clamp(26px,5vw,40px);font-weight:800;
      color:var(--ink-strong,#eef2ee);letter-spacing:-.8px;line-height:1.1;margin-bottom:8px;
    }
    .scheda-hero .sub{
      font-size:16px;color:var(--muted,rgba(238,242,238,.5));font-family:'JetBrains Mono',monospace;
    }

    .scheda-card{
      background:var(--surface,#0f1a12);border:1px solid var(--line,rgba(255,255,255,.08));
      border-radius:12px;padding:22px 24px;margin-bottom:18px;
    }
    .scheda-card h2{
      font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
      color:var(--muted,rgba(238,242,238,.4));font-family:'JetBrains Mono',monospace;
      margin-bottom:12px;
    }
    .scheda-card p{font-size:15px;color:var(--muted,rgba(238,242,238,.6));line-height:1.75}

    .valore-card{
      background:linear-gradient(135deg,rgba(201,168,76,.1),var(--surface,#0f1a12));
      border:1px solid rgba(201,168,76,.28);
      border-radius:12px;padding:22px 24px;margin-bottom:18px;
    }
    .valore-card .label{
      font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
      color:#c9a84c;font-family:'JetBrains Mono',monospace;margin-bottom:8px;
    }
    .valore-card p{font-size:16px;color:var(--ink-strong,#eef2ee);line-height:1.7}

    .tech-list{display:flex;flex-wrap:wrap;gap:7px}
    .tech-item{
      padding:4px 11px;border-radius:6px;font-size:12px;font-weight:500;
      font-family:'JetBrains Mono',monospace;
      background:rgba(46,196,160,.1);border:1px solid rgba(46,196,160,.22);color:#2ec4a0;
    }

    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px}
    .tag-item{
      padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;
      font-family:'JetBrains Mono',monospace;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      color:rgba(238,242,238,.45);
    }

    .highlights-list{list-style:none;padding:0;margin:0;display:grid;gap:6px}
    .highlights-list li{
      padding:7px 12px;border-left:2px solid rgba(201,168,76,.4);
      font-size:14px;color:rgba(238,242,238,.65);
    }

    .cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
    .btn-p{
      display:inline-flex;align-items:center;gap:7px;padding:11px 22px;
      background:#c9a84c;color:#08110c;border-radius:8px;font-weight:800;font-size:14px;
      text-decoration:none;transition:opacity .15s;
    }
    .btn-p:hover{opacity:.88;text-decoration:none}
    .btn-s{
      display:inline-flex;align-items:center;gap:7px;padding:11px 18px;
      background:transparent;color:rgba(238,242,238,.55);
      border:1px solid rgba(255,255,255,.18);border-radius:8px;
      font-weight:600;font-size:13px;text-decoration:none;transition:all .15s;
    }
    .btn-s:hover{border-color:#c9a84c;color:#c9a84c;text-decoration:none}

    .state-box{text-align:center;padding:64px 20px}
    .state-box .ico{font-size:44px;margin-bottom:12px}
    .state-box h2{font-size:20px;color:var(--ink-strong,#eef2ee);margin-bottom:8px}
    .state-box p{color:var(--muted,rgba(238,242,238,.5));font-size:14px}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:26px;height:26px;border:2px solid rgba(255,255,255,.1);
             border-top-color:#c9a84c;border-radius:50%;
             animation:spin .7s linear infinite;margin:0 auto 14px}
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Salta al contenuto</a>

  <header class="site-header">
    <nav class="nav container" aria-label="Navigazione principale">
      <a class="brand" href="index.html" aria-label="Homepage Ronaldo Riska">
        <span class="brand-mark">RR</span>
        <span class="brand-text">
          <span>Ronaldo Riska</span>
          <span>Scheda progetto</span>
        </span>
      </a>
      <div class="nav-links" id="site-menu" data-nav-menu>
        <a href="index.html">Home</a>
        <a href="curriculum.html">Curriculum</a>
        <a href="tessitura.html">Tessitura</a>
        <a href="cad-moda.html">CAD Moda</a>
        <a href="supply-chain-production.html">Supply Chain</a>
      </div>
    </nav>
  </header>

  <main id="main">
    <section class="section">
      <div class="container" style="max-width:820px" id="scheda-content">
        <div style="text-align:center;padding:60px 0">
          <div class="spinner"></div>
          <p style="color:rgba(238,242,238,.4);font-size:14px">Caricamento scheda…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span data-year></span> Ronaldo Riska</p>
      <a href="index.html#progetti">← Tutti i progetti</a>
    </div>
  </footer>

  <!-- project-data.js popola window.portfolioProjects -->
  <script src="project-data.js" defer></script>
  <script defer>

    /* ── Helpers ── */
    function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function param(n){ return new URLSearchParams(window.location.search).get(n); }

    /* ── Mappa area → pagina ── */
    const AREA_PAGE = {
      tessitura: "tessitura.html",
      cad:       "cad-moda.html",
      supply:    "supply-chain-production.html",
    };
    const AREA_LABEL = {
      tessitura: "Tessitura",
      cad:       "CAD Moda",
      supply:    "Supply Chain",
    };

    /* ── Render scheda ── */
    function renderScheda(p) {
      const area      = p.category || p.area || "";
      const areaLabel = AREA_LABEL[area] || area;
      const areaHref  = AREA_PAGE[area]  || "index.html#progetti";
      const url       = p.url || p.link || "#";
      const stato     = p.status || p.stato || "";
      const tipo      = p.type  || p.tipo  || "";
      const detail    = p.detail || {};
      const tags      = p.tags || [];
      const tech      = detail.tech || [];
      const highlights= detail.highlights || [];

      document.title = `${esc(p.nome||p.title)} | Ronaldo Riska Portfolio`;

      return `
        <nav class="scheda-breadcrumb" aria-label="Percorso">
          <a href="index.html">Home</a><span>›</span>
          <a href="${esc(areaHref)}">${esc(areaLabel)}</a><span>›</span>
          <span>${esc(p.nome||p.title)}</span>
        </nav>

        <div class="scheda-hero">
          <div class="scheda-badges">
            <span class="scheda-badge badge-area">${esc(areaLabel)}</span>
            ${tipo ? `<span class="scheda-badge badge-tipo">${esc(tipo)}</span>` : ""}
            ${stato==="Live"  ? '<span class="scheda-badge badge-live">● Live</span>' : ""}
            ${stato==="Draft" ? '<span class="scheda-badge badge-draft">Draft</span>' : ""}
            ${p.anno||p.year  ? `<span class="scheda-badge badge-anno">${p.anno||p.year}</span>` : ""}
          </div>
          <h1>${esc(p.nome||p.title)}</h1>
          ${p.sottotitolo||p.subtitle
            ? `<p class="sub">${esc(p.sottotitolo||p.subtitle)}</p>` : ""}
        </div>

        <div class="scheda-card">
          <h2>Descrizione</h2>
          <p>${esc(p.descrizione||p.description||"")}</p>
        </div>

        ${detail.value||p.valore ? `
        <div class="valore-card">
          <div class="label">Valore operativo</div>
          <p>${esc(detail.value||p.valore)}</p>
        </div>` : ""}

        ${tech.length ? `
        <div class="scheda-card">
          <h2>Stack tecnologico</h2>
          <div class="tech-list">
            ${tech.map(t=>`<span class="tech-item">${esc(t)}</span>`).join("")}
          </div>
        </div>` : ""}

        ${highlights.length ? `
        <div class="scheda-card">
          <h2>Caratteristiche principali</h2>
          <ul class="highlights-list">
            ${highlights.map(h=>`<li>${esc(h)}</li>`).join("")}
          </ul>
        </div>` : ""}

        ${tags.length ? `
        <div class="scheda-card">
          <h2>Tag</h2>
          <div class="tags-wrap">
            ${tags.map(t=>`<span class="tag-item">${esc(t)}</span>`).join("")}
          </div>
        </div>` : ""}

        <div class="cta-row">
          ${url && url !== "#"
            ? `<a class="btn-p" href="${esc(url)}">${esc(p.linkLabel||"Apri progetto")} →</a>`
            : ""}
          <a class="btn-s" href="${esc(areaHref)}">← ${esc(areaLabel)}</a>
          <a class="btn-s" href="index.html#progetti">Tutti i progetti</a>
        </div>`;
    }

    /* ── Error states ── */
    function notFound(id) {
      return `<div class="state-box">
        <div class="ico">🔍</div>
        <h2>Progetto non trovato</h2>
        <p>Nessun progetto con ID <code style="color:#c9a84c">${esc(id||"?")}</code></p>
        <div class="cta-row" style="justify-content:center;margin-top:20px">
          <a class="btn-s" href="index.html#progetti">← Tutti i progetti</a>
        </div>
      </div>`;
    }

    function fetchError(msg) {
      return `<div class="state-box">
        <div class="ico">⚠️</div>
        <h2>Errore di caricamento</h2>
        <p>Impossibile caricare i dati.<br>
           Verifica che <code style="color:#c9a84c">project-data.js</code> esista nella root.</p>
        <p style="margin-top:8px;font-size:11px;opacity:.5">${esc(msg)}</p>
        <div class="cta-row" style="justify-content:center;margin-top:20px">
          <a class="btn-s" href="index.html">← Home</a>
        </div>
      </div>`;
    }

    /* ── Init (aspetta che project-data.js sia caricato) ── */
    async function init() {
      const mount = document.getElementById("scheda-content");
      const id    = param("id");

      if (!id) { mount.innerHTML = notFound(null); return; }

      // Attende window.portfolioProjects (caricato da project-data.js defer)
      const waitForData = () => new Promise((resolve, reject) => {
        if (window.portfolioProjects?.length) { resolve(window.portfolioProjects); return; }
        let tries = 0;
        const iv = setInterval(() => {
          if (window.portfolioProjects?.length) { clearInterval(iv); resolve(window.portfolioProjects); }
          else if (++tries > 30) {
            clearInterval(iv);
            // Fallback: prova fetch diretto di progetti.json
            const base = window.location.pathname.replace(/\/[^/]*$/, "/");
            fetch(window.location.origin + base + "progetti.json")
              .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
              .then(resolve).catch(reject);
          }
        }, 100);
      });

      try {
        const projects = await waitForData();
        const proj = projects.find(p => p.id === id);
        mount.innerHTML = proj ? renderScheda(proj) : notFound(id);
      } catch (e) {
        mount.innerHTML = fetchError(String(e));
        console.error("progetto.html:", e);
      }
    }

    // Footer year
    document.querySelectorAll("[data-year]")
            .forEach(el => el.textContent = new Date().getFullYear());

    document.readyState === "loading"
      ? document.addEventListener("DOMContentLoaded", init)
      : init();
  </script>
</body>
</html>
