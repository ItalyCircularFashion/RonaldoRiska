<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjecTrak™ — PM Suite Enterprise</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060b18;--s1:#0b1324;--s2:#101b30;--s3:#152039;--s4:#1a2544;
  --bd:#1d3557;--bd2:#2a4a78;--bd3:#3d6499;
  --acc:#3d8bff;--acc2:#00d4c8;--acc3:#7c5af7;
  --warn:#f5a623;--danger:#ff4560;--ok:#00c896;
  --crit:#ff4560;--crit-bg:rgba(255,69,96,0.08);
  --txt:#c8deff;--txt2:#7898c0;--txt3:#3e5878;--txtw:#ffffff;
  --mono:'JetBrains Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --disp:'Exo 2',sans-serif;
  --r:6px;--r2:10px;
  --sh:0 4px 24px rgba(0,0,0,0.5);
  --sh2:0 8px 40px rgba(0,0,0,0.6);
  --glow-acc:0 0 16px rgba(61,139,255,0.25);
  --glow-crit:0 0 16px rgba(255,69,96,0.4);
  --glow-ok:0 0 16px rgba(0,200,150,0.3);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bd3)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
#header{
  display:flex;align-items:center;gap:0;
  background:var(--s1);
  border-bottom:1px solid var(--bd);
  min-height:56px;flex-shrink:0;
  position:relative;z-index:100;
  padding:0 16px 0 0;
}
#header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--acc) 0%,var(--acc3) 50%,transparent 100%);
  opacity:0.4;
}
.logo{
  font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:0.05em;
  color:var(--txtw);padding:0 20px;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
  border-right:1px solid var(--bd);min-height:56px;
  background:linear-gradient(135deg,var(--s2),var(--s1));
}
.logo-icon{
  width:28px;height:28px;background:linear-gradient(135deg,var(--acc),var(--acc3));
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;box-shadow:var(--glow-acc);
}
.project-meta{
  padding:0 20px;border-right:1px solid var(--bd);min-height:56px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
  min-width:220px;
}
.project-name{
  font-family:var(--disp);font-weight:700;font-size:13px;color:var(--txtw);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;
}
.project-sub{
  font-size:10px;color:var(--txt2);font-family:var(--mono);
  display:flex;align-items:center;gap:8px;
}
.badge{
  padding:1px 7px;border-radius:3px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
}
.badge-active{background:rgba(0,200,150,0.15);color:var(--ok);border:1px solid rgba(0,200,150,0.3)}
.badge-warn{background:rgba(245,166,35,0.15);color:var(--warn);border:1px solid rgba(245,166,35,0.3)}

.tab-nav{display:flex;align-items:flex-end;gap:0;padding:0 12px;flex:1}
.tab{
  padding:0 18px;min-height:56px;background:none;border:none;cursor:pointer;
  font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--txt3);
  border-bottom:2px solid transparent;transition:all .2s;
  position:relative;white-space:nowrap;
}
.tab:hover{color:var(--txt2);border-bottom-color:var(--bd2)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab .tab-count{
  font-size:9px;background:var(--s3);color:var(--txt2);border-radius:3px;
  padding:1px 5px;margin-left:5px;font-family:var(--mono);
}
.tab.active .tab-count{background:rgba(61,139,255,0.15);color:var(--acc)}

.header-actions{display:flex;align-items:center;gap:6px;padding-left:12px}
.hbtn{
  padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd);
  background:var(--s2);color:var(--txt2);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--sans);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.hbtn:hover{border-color:var(--bd3);color:var(--txt);background:var(--s3)}
.hbtn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.hbtn.primary:hover{background:#5a9fff;box-shadow:var(--glow-acc)}
.hbtn svg{width:13px;height:13px}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;position:relative}
.view{
  position:absolute;inset:0;overflow:auto;
  padding:24px;opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.view.active{opacity:1;pointer-events:all}

/* ── SECTION HEADER ── */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.sec-title{
  font-family:var(--disp);font-size:18px;font-weight:700;color:var(--txtw);
  display:flex;align-items:center;gap:10px;
}
.sec-title::before{
  content:'';width:3px;height:20px;border-radius:2px;
  background:linear-gradient(180deg,var(--acc),var(--acc3));
  display:block;
}
.sec-actions{display:flex;gap:8px;align-items:center}
.btn-sm{
  padding:5px 12px;border-radius:var(--r);border:1px solid var(--bd);
  background:var(--s2);color:var(--txt2);font-size:11px;cursor:pointer;
  transition:all .2s;font-family:var(--sans);
}
.btn-sm:hover{border-color:var(--bd3);color:var(--txt)}
.btn-sm.active{border-color:var(--acc);color:var(--acc);background:rgba(61,139,255,0.08)}

/* ── CARD ── */
.card{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:16px;box-shadow:var(--sh);
}
.card-hdr{
  font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--txt2);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}

/* ── DASHBOARD ── */
.dash-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:auto auto;
  gap:16px;
}
.kpi-row{
  grid-column:1/-1;display:grid;
  grid-template-columns:repeat(4,1fr);gap:16px;
}
.kpi{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:18px 20px;position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.kpi:hover{border-color:var(--bd3);box-shadow:var(--glow-acc)}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--acc-color,var(--acc)),transparent);
}
.kpi.c-ok::before{--acc-color:var(--ok)}
.kpi.c-warn::before{--acc-color:var(--warn)}
.kpi.c-danger::before{--acc-color:var(--danger)}
.kpi.c-purple::before{--acc-color:var(--acc3)}
.kpi.c-cyan::before{--acc-color:var(--acc2)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--txt3);margin-bottom:8px}
.kpi-val{
  font-family:var(--disp);font-size:30px;font-weight:800;color:var(--txtw);
  line-height:1;margin-bottom:4px;
}
.kpi-val span.unit{font-size:16px;font-weight:500;color:var(--txt2);margin-left:3px}
.kpi-sub{font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:6px}
.kpi-sub .up{color:var(--ok)}
.kpi-sub .dn{color:var(--danger)}
.kpi-bar{
  height:3px;background:var(--s3);border-radius:2px;margin-top:10px;overflow:hidden;
}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width 1s ease;background:var(--acc)}
.kpi.c-ok .kpi-bar-fill{background:var(--ok)}
.kpi.c-warn .kpi-bar-fill{background:var(--warn)}
.kpi.c-danger .kpi-bar-fill{background:var(--danger)}

.charts-row{grid-column:1/-1;display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:16px}
.chart-wrap{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px}
.chart-title{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt2);margin-bottom:14px}
.gantt-mini{margin-top:4px}
.gantt-mini-row{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;
}
.gmr-label{font-size:11px;color:var(--txt2);width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--sans)}
.gmr-bar-wrap{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden;position:relative}
.gmr-bar{height:100%;border-radius:4px;transition:width 1s ease}
.gmr-pct{font-family:var(--mono);font-size:10px;color:var(--txt2);width:34px;text-align:right}

/* ── STATUS DOTS ── */
.dot{
  width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;
}
.dot-ok{background:var(--ok);box-shadow:0 0 6px rgba(0,200,150,0.6)}
.dot-warn{background:var(--warn);box-shadow:0 0 6px rgba(245,166,35,0.6)}
.dot-danger{background:var(--danger);box-shadow:0 0 6px rgba(255,69,96,0.6)}
.dot-pending{background:var(--txt3)}
.dot-active{background:var(--acc);box-shadow:0 0 6px rgba(61,139,255,0.6)}

/* ── WBS ── */
.wbs-tree{max-width:960px}
.wbs-node{
  border-radius:var(--r);margin-bottom:4px;
  cursor:pointer;transition:background .15s;
}
.wbs-node-inner{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--r);
  border:1px solid transparent;transition:all .15s;
}
.wbs-node-inner:hover{background:var(--s3);border-color:var(--bd)}
.wbs-children{
  padding-left:24px;overflow:hidden;
  max-height:0;transition:max-height .3s ease;
}
.wbs-children.open{max-height:2000px}
.wbs-toggle{
  width:18px;height:18px;border-radius:3px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--txt2);flex-shrink:0;transition:transform .2s;
  border:1px solid var(--bd);
}
.wbs-toggle.open{transform:rotate(90deg)}
.wbs-toggle.leaf{background:none;border-color:transparent;cursor:default}
.wbs-code{
  font-family:var(--mono);font-size:11px;color:var(--txt3);
  width:38px;flex-shrink:0;
}
.wbs-name{
  flex:1;font-size:13px;color:var(--txt);font-weight:500;
}
.wbs-node--group .wbs-name{
  font-family:var(--disp);font-weight:700;color:var(--txtw);font-size:13px;
}
.wbs-color-bar{
  width:3px;height:32px;border-radius:2px;flex-shrink:0;
}
.wbs-meta{
  display:flex;align-items:center;gap:14px;margin-left:auto;
}
.wbs-dur{font-family:var(--mono);font-size:11px;color:var(--txt2)}
.wbs-resp{font-size:11px;color:var(--txt2);min-width:90px;text-align:right}
.wbs-prog-wrap{width:80px}
.wbs-prog-bar{height:4px;background:var(--s4);border-radius:2px;overflow:hidden}
.wbs-prog-fill{height:100%;border-radius:2px;background:var(--acc);transition:width .5s ease}
.wbs-pct{font-family:var(--mono);font-size:10px;color:var(--txt2);text-align:right;margin-top:2px}
.wbs-status{margin-left:6px}
.tag{
  padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
}
.tag-done{background:rgba(0,200,150,0.1);color:var(--ok);border:1px solid rgba(0,200,150,0.2)}
.tag-active{background:rgba(61,139,255,0.1);color:var(--acc);border:1px solid rgba(61,139,255,0.2)}
.tag-pending{background:rgba(255,255,255,0.04);color:var(--txt3);border:1px solid var(--bd)}
.tag-critical{background:var(--crit-bg);color:var(--crit);border:1px solid rgba(255,69,96,0.3)}

/* ── GANTT ── */
.gantt-wrap{display:flex;flex-direction:column;gap:0;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.gantt-controls{
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--bd);background:var(--s1);
}
.gantt-body{display:flex;overflow:hidden;flex:1}
.gantt-sidebar{
  min-width:260px;max-width:260px;border-right:1px solid var(--bd);
  background:var(--s1);overflow:hidden;flex-shrink:0;
}
.gantt-chart-area{flex:1;overflow:auto;position:relative}
.gantt-row-hdr{
  height:56px;display:flex;align-items:flex-end;padding-bottom:0;
  background:var(--s1);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:10;
}
.gantt-sidebar-hdr{
  height:56px;display:flex;align-items:center;padding:0 14px;
  font-family:var(--disp);font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--txt3);
  border-bottom:1px solid var(--bd);background:var(--s1);
  position:sticky;top:0;z-index:11;
}
.gantt-task-row{
  height:40px;display:flex;align-items:center;padding:0 14px;gap:8px;
  border-bottom:1px solid rgba(29,53,87,0.5);
  transition:background .1s;cursor:pointer;
}
.gantt-task-row:hover{background:var(--s3)}
.gantt-task-row.critical{background:rgba(255,69,96,0.03)}
.gantt-task-row.group{background:var(--s1);border-bottom:1px solid var(--bd)}
.gantt-indent{flex-shrink:0}
.gantt-task-name{
  font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.gantt-task-row.group .gantt-task-name{font-weight:700;color:var(--txtw);font-family:var(--disp)}
.gantt-task-row.critical .gantt-task-name{color:var(--crit)}

/* ── PERT ── */
.pert-wrap{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);
  overflow:hidden;
}
.pert-toolbar{
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bd);background:var(--s1);
}
.pert-legend{display:flex;align-items:center;gap:16px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--txt2)}
.legend-box{width:16px;height:12px;border-radius:2px;border:2px solid}
.pert-svg-area{overflow:auto;background:var(--bg);position:relative}
.pert-node-box{transition:filter .2s}
.pert-node-box:hover{filter:brightness(1.15)}

/* ── TASKS TABLE ── */
.tasks-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.search-box{
  display:flex;align-items:center;gap:8px;background:var(--s2);
  border:1px solid var(--bd);border-radius:var(--r);padding:6px 12px;
}
.search-box input{
  background:none;border:none;outline:none;color:var(--txt);font-size:12px;
  font-family:var(--sans);width:200px;
}
.search-box input::placeholder{color:var(--txt3)}
.table-wrap{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);
  overflow:hidden;
}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--s1);border-bottom:1px solid var(--bd)}
th{
  padding:10px 14px;font-family:var(--disp);font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);
  text-align:left;white-space:nowrap;
}
tbody tr{border-bottom:1px solid rgba(29,53,87,0.4);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--s3)}
tbody tr.critical-row{background:rgba(255,69,96,0.03)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;font-size:12px;color:var(--txt)}
td.mono{font-family:var(--mono);font-size:11px}
td.crit{color:var(--crit)}
.prog-cell{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:4px;background:var(--s4);border-radius:2px;overflow:hidden;min-width:60px}
.prog-fill{height:100%;border-radius:2px;background:var(--acc);transition:width .5s}
.prog-pct{font-family:var(--mono);font-size:10px;color:var(--txt2);width:30px}
.action-btns{display:flex;gap:6px}
.abtn{
  padding:4px 8px;border-radius:4px;border:1px solid var(--bd);
  background:none;color:var(--txt2);font-size:10px;cursor:pointer;
  transition:all .15s;font-family:var(--sans);
}
.abtn:hover{border-color:var(--acc);color:var(--acc)}
.abtn.del:hover{border-color:var(--danger);color:var(--danger)}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r2);
  box-shadow:var(--sh2);width:640px;max-width:94vw;max-height:90vh;
  overflow-y:auto;transform:translateY(20px);transition:transform .2s;
}
.overlay.open .modal{transform:translateY(0)}
.modal-hdr{
  padding:20px 24px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--disp);font-size:16px;font-weight:700;color:var(--txtw)}
.modal-close{
  width:28px;height:28px;border-radius:var(--r);border:1px solid var(--bd);
  background:none;color:var(--txt2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal-body{padding:24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--bd);
  display:flex;justify-content:flex-end;gap:10px;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:0.07em}
input,select,textarea{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:8px 12px;color:var(--txt);font-size:13px;font-family:var(--sans);
  outline:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--s2)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.form-hint{font-size:10px;color:var(--txt3)}
.btn-primary{
  padding:9px 20px;background:var(--acc);border:1px solid var(--acc);
  border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--sans);
}
.btn-primary:hover{background:#5a9fff;box-shadow:var(--glow-acc)}
.btn-secondary{
  padding:9px 20px;background:var(--s3);border:1px solid var(--bd);
  border-radius:var(--r);color:var(--txt2);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--sans);
}
.btn-secondary:hover{border-color:var(--bd3);color:var(--txt)}

/* ── CPM INFO PANEL ── */
.cpm-summary{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd);
}
.cpm-stat{text-align:center}
.cpm-stat-val{font-family:var(--disp);font-size:20px;font-weight:800;color:var(--txtw)}
.cpm-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--txt3);margin-top:2px}
.cpm-path{
  flex:1;font-family:var(--mono);font-size:10px;color:var(--crit);
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
}
.cpm-node{
  background:var(--crit-bg);border:1px solid rgba(255,69,96,0.3);
  border-radius:3px;padding:2px 7px;
}
.arrow-sep{color:var(--txt3)}

/* ── TOOLTIP ── */
#tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);
  padding:10px 14px;font-size:11px;color:var(--txt);
  box-shadow:var(--sh2);max-width:260px;opacity:0;transition:opacity .15s;
}
#tooltip.show{opacity:1}
#tooltip .tt-title{font-family:var(--disp);font-weight:700;color:var(--txtw);margin-bottom:6px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:2px}
#tooltip .tt-key{color:var(--txt3)}
#tooltip .tt-val{color:var(--txt);font-family:var(--mono);font-size:10px}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse-crit{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
.anim-in{animation:fadeIn .3s ease both}
.pulse-crit{animation:pulse-crit 2s infinite}

/* ── SCROLLBAR for gantt ── */
.gantt-chart-area::-webkit-scrollbar{height:8px;width:8px}
.gantt-chart-area::-webkit-scrollbar-track{background:var(--s1)}
.gantt-chart-area::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── PRINT ── */
@media print{
  #header .header-actions{display:none}
  .view{opacity:1!important;pointer-events:all!important;position:static!important}
  body{background:#fff;color:#000}
}

/* ── RESP ── */

  .gantt-sidebar{min-width:180px;max-width:180px}

// ═══════════════════════════════════════════════════════
//  CPM ENGINE
// ═══════════════════════════════════════════════════════
function topoSort(tasks){
  const visited=new Set(), result=[];
  const taskMap=Object.fromEntries(tasks.map(t=>[t.id,t]));
  function visit(id){
    if(visited.has(id))return;
    visited.add(id);
    const t=taskMap[id];
    if(!t)return;
    (t.deps||[]).forEach(d=>visit(d));
    result.push(t);
  }
  tasks.forEach(t=>visit(t.id));
  return result;
}

function runCPM(){
  const tasks=S.tasks;
  const sorted=topoSort(tasks);

  // Forward pass
  sorted.forEach(t=>{
    const preds=tasks.filter(x=>(t.deps||[]).includes(x.id));
    t.ES = preds.length===0 ? 0 : Math.max(...preds.map(p=>p.EF||0));
    t.EF = t.ES + (t.dur||0);
  });

  const projEnd = Math.max(...tasks.map(t=>t.EF||0));
  S.projectDuration = projEnd;

  // Backward pass
  const rev=[...sorted].reverse();
  rev.forEach(t=>{
    const succs=tasks.filter(x=>(x.deps||[]).includes(t.id));
    t.LF = succs.length===0 ? projEnd : Math.min(...succs.map(s=>s.LS||projEnd));
    t.LS = t.LF - (t.dur||0);
    t.float = t.LS - t.ES;
    t.isCritical = (t.float===0) && (t.dur>0);
  });

  // Mark group tasks
  tasks.filter(t=>t.isGroup).forEach(g=>{
    const children=tasks.filter(c=>c.parent===g.id&&!c.isGroup);
    if(children.length){
      g.ES=Math.min(...children.map(c=>c.ES));
      g.EF=Math.max(...children.map(c=>c.EF));
      g.LS=g.ES; g.LF=g.EF; g.float=0;
      g.isCritical=false;
    }
  });

  // Critical path chain
  const critTasks=tasks.filter(t=>t.isCritical);
  const critPath=[];
  // Trace longest path
  const endTasks=critTasks.filter(t=>{
    return !critTasks.some(x=>(x.deps||[]).includes(t.id));
  });
  if(endTasks.length){
    let cur=endTasks.reduce((a,b)=>a.EF>b.EF?a:b);
    while(cur){
      critPath.unshift(cur);
      const preds=critTasks.filter(t=>(cur.deps||[]).includes(t.id));
      cur=preds.length?preds.reduce((a,b)=>b.EF>a.EF?b:a):null;
    }
  }
  S.criticalPath=critPath;
}

      <div class="kpi anim-in" style="animation-delay:.4s">
        <div class="kpi-lbl">Cost Perf. Index</div>
        <div class="kpi-val" style="color:${cpi>=1?'var(--ok)':'var(--danger)'}">${cpi}</div>
        <div class="kpi-sub">${cpi>=1?'<span class="up">▲ Sotto budget</span>':'<span class="dn">▼ Sopra budget</span>'}</div>
      </div>
    </div>

    <div class="charts-row" style="margin-bottom:0">
      <div class="chart-wrap anim-in" style="animation-delay:.45s">
        <div class="chart-title">Avanzamento per Fase</div>
        <div class="gantt-mini">
          ${groups.map((g,i)=>{
            const children=leaves.filter(c=>c.parent===g.id);
            const pct=children.length?Math.round(children.reduce((s,c)=>s+c.prog,0)/children.length):g.prog;
            const col=phaseColors[i%phaseColors.length];
            return `<div class="gantt-mini-row">
              <div class="gmr-label">${g.wbs}. ${g.name}</div>
              <div class="gmr-bar-wrap">
                <div class="gmr-bar" style="width:0%;background:${col}" data-target="${pct}"></div>
              </div>
              <div class="gmr-pct">${pct}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="chart-wrap anim-in" style="animation-delay:.5s">
        <div class="chart-title">Distribuzione Stato</div>
        ${renderDonut([
          {label:'Completate',val:done,color:'var(--ok)'},
          {label:'In Corso',val:active,color:'var(--acc)'},
          {label:'In Attesa',val:pending,color:'var(--bd3)'}
        ],total)}
      </div>

      <div class="chart-wrap anim-in" style="animation-delay:.55s">
        <div class="chart-title">Budget per Fase (€)</div>
        ${renderBudgetBars(groups,leaves,phaseColors)}
      </div>
    </div>
  </div>`;

  // Animate KPI counters
  requestAnimationFrame(()=>{
    document.querySelectorAll('.count-up').forEach(el2=>{
      const target=parseInt(el2.dataset.val);
      animCount(el2,target,1000);
    });
    document.querySelectorAll('.kpi-bar-fill[data-target],.gmr-bar[data-target]').forEach(bar=>{
      setTimeout(()=>{bar.style.width=bar.dataset.target+'%'},100);
    });
  });
}

function animCount(el,target,dur){
  const start=performance.now();
  const step=ts=>{
    const p=Math.min((ts-start)/dur,1);
    el.textContent=Math.round(p*target);
    if(p<1)requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function renderDonut(slices,total){
  if(!total)return'<div style="color:var(--txt3);font-size:12px;text-align:center;padding:20px">Nessun dato</div>';
  const cx=80,cy=80,r=55,stroke=18;
  let paths='',offset=0;
  const circ=2*Math.PI*r;
  slices.forEach(s=>{
    const pct=s.val/total;
    const dash=pct*circ;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset*circ}" transform="rotate(-90 ${cx} ${cy})" opacity="0.85"/>`;
    offset+=pct;
  });
  const legend=slices.map(s=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);margin-bottom:4px">
    <span style="width:10px;height:10px;border-radius:2px;background:${s.color};display:inline-block"></span>${s.label}: <b style="color:var(--txtw)">${s.val}</b></div>`).join('');
  return`<div style="display:flex;align-items:center;gap:16px">
    <svg width="160" height="160" viewBox="0 0 160 160">${paths}
      <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--txtw)" font-family="var(--disp)" font-size="20" font-weight="800">${total}</text>
      <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--txt2)" font-size="9">totale</text>
    </svg>
    <div>${legend}</div>
  </div>`;
}

function renderBudgetBars(groups,leaves,colors){
  const rows=groups.map((g,i)=>{
    const ch=leaves.filter(c=>c.parent===g.id);
    const budget=ch.reduce((s,c)=>s+c.cost,0);
    const spent=ch.reduce((s,c)=>s+(c.cost*(c.prog/100)),0);
    const maxBudget=Math.max(...groups.map(gg=>leaves.filter(c=>c.parent===gg.id).reduce((s,c)=>s+c.cost,0)),1);
    const wBudget=Math.round(budget/maxBudget*100);
    const wSpent=budget>0?Math.round(spent/budget*wBudget):0;
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;color:var(--txt2)">${g.wbs}. ${g.name}</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--txt3)">€${budget.toLocaleString('it-IT')}</span>
      </div>
      <div style="height:8px;background:var(--s4);border-radius:4px;overflow:hidden;position:relative">
        <div style="position:absolute;top:0;left:0;height:100%;width:${wBudget}%;background:${colors[i%colors.length]};opacity:0.3;border-radius:4px"></div>
        <div class="gmr-bar" style="height:100%;width:0%;background:${colors[i%colors.length]};border-radius:4px;position:relative;z-index:1" data-target="${wSpent}"></div>
      </div>
    </div>`;
  }).join('');
  return`<div>${rows}</div>`;
}

function renderWBS(){
  const el=document.getElementById('view-wbs');
  const phaseColors=['#00c896','#3d8bff','#7c5af7','#f5a623','#ff4560'];
  const roots=S.tasks.filter(t=>!t.parent);

  function nodeHTML(task,depth,phaseIdx){
    const children=S.tasks.filter(c=>c.parent===task.id);
    const hasChildren=children.length>0;
    const isOpen=S.expanded.has(task.id);
    const col=phaseColors[phaseIdx%phaseColors.length];
    const statusClass={done:'tag-done',active:'tag-active',pending:'tag-pending'}[task.status]||'tag-pending';
    const statusLabel={done:'Completato',active:'In Corso',pending:'In Attesa'}[task.status]||'';
    const isCrit=task.isCritical;

    let inner=`
    <div class="wbs-node-inner${task.isGroup?' wbs-node--group':''}${isCrit?' '+'tag-critical':''}">
      <div class="wbs-toggle ${hasChildren?(isOpen?'open':''):' leaf'}" onclick="toggleWBS(event,'${task.id}')">
        ${hasChildren?(isOpen?'▶':'▶'):'&bull;'}
      </div>
      <div class="wbs-color-bar" style="background:${col};opacity:${depth===0?1:0.5}"></div>
      <div class="wbs-code">${task.wbs}</div>
      <div class="wbs-name">${task.name}${isCrit?'&nbsp;<span class="tag tag-critical" style="font-size:8px">CRITICO</span>':''}</div>
      <div class="wbs-meta">
        ${task.dur>0?`<div class="wbs-dur">${task.dur}gg</div>`:''}
        ${task.resp?`<div class="wbs-resp">${task.resp}</div>`:''}
        ${!task.isGroup?`<div class="wbs-prog-wrap">
          <div class="wbs-prog-bar"><div class="wbs-prog-fill" style="width:${task.prog}%;background:${col}"></div></div>

      <div style="display:flex;align-items:center;gap:20px;padding:12px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:8px">

        <span style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);flex:1;margin-left:42px">Nome Attività</span>
        <span style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);width:40px">Durata</span>
        <span style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);width:90px;text-align:right">Responsabile</span>
        <span style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);width:120px;text-align:center">Avanzamento</span>
        <span style="font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);width:80px;text-align:center">Stato</span>

function toggleWBS(e,id){
  e.stopPropagation();
  if(S.expanded.has(id)){S.expanded.delete(id)}else{S.expanded.add(id)}
  renderWBS();
}
function expandAll(){S.tasks.forEach(t=>S.expanded.add(t.id));renderWBS()}
function collapseAll(){S.expanded.clear();renderWBS()}

function renderGantt(){
  const el=document.getElementById('view-gantt');
  const DW=S.ganttZoom;
  const ROW_H=40;
  const HDR_H=56;
  const SIDEBAR_W=260;
  const start=new Date(S.project.startDate);
  const totalDays=S.projectDuration||70;
  const svgW=Math.max(totalDays*DW+60,600);
  const today=new Date();
  const todayX=(today-start)/(24*60*60*1000)*DW;

  const allTasks=S.tasks;
  const SVG_H=allTasks.length*ROW_H;

  // Month headers
  const months=[];
  let d=new Date(start);
  while(d<new Date(start.getTime()+totalDays*24*60*60*1000+1)){
    const dayIdx=Math.round((d-start)/(24*60*60*1000));
    const mStart=dayIdx;
    const nextMonth=new Date(d.getFullYear(),d.getMonth()+1,1);
    const mEnd=Math.min(Math.round((nextMonth-start)/(24*60*60*1000)),totalDays);
    months.push({label:d.toLocaleDateString('it-IT',{month:'short',year:'2-digit'}),x:mStart*DW,w:(mEnd-mStart)*DW});
    d=nextMonth;
  }

  // Week markers
  const weeks=[];
  for(let i=0;i<=totalDays;i+=7){weeks.push(i)}

  // Task rows HTML and SVG
  let sidebarRows='',svgRows='',svgBars='',svgDeps='';
  const taskMap=Object.fromEntries(allTasks.map(t=>[t.id,t]));

  allTasks.forEach((task,i)=>{
    const y=i*ROW_H;
    const barY=y+ROW_H*0.25;
    const barH=ROW_H*0.5;
    const isGroup=task.isGroup;
    const isCrit=task.isCritical;

    // Sidebar row
    const indent=isGroup?0:22;
    sidebarRows+=`<div class="gantt-task-row ${isGroup?'group':''} ${isCrit?'critical':''}" onclick="openTaskModal('${task.id}')" style="height:${ROW_H}px">
      <div class="gantt-indent" style="width:${indent}px"></div>
      ${isGroup?`<span style="font-size:10px;color:var(--acc);margin-right:4px">▶</span>`:'<span style="width:14px;display:inline-block;flex-shrink:0;margin-right:4px"></span>'}
      <div class="gantt-task-name">${task.wbs} ${task.name}</div>
    </div>`;

    // Alternating row bg
    svgRows+=`<rect x="0" y="${y}" width="${svgW}" height="${ROW_H}" fill="${i%2===0?'rgba(255,255,255,0.01)':'none'}"/>
    <line x1="0" y1="${y+ROW_H}" x2="${svgW}" y2="${y+ROW_H}" stroke="rgba(29,53,87,0.5)" stroke-width="0.5"/>`;

    if(!isGroup&&task.dur>0){
      const bx=(task.ES||0)*DW;
      const bw=(task.dur||0)*DW;
      const progW=bw*(task.prog||0)/100;
      const barColor=isCrit?'url(#gc)':task.status==='done'?'url(#gd)':'url(#ga)';
      const borderColor=isCrit?'var(--crit)':task.status==='done'?'#00c896':'#3d8bff';

      svgBars+=`
      <g class="gantt-bar" data-id="${task.id}">
        <rect x="${bx}" y="${barY}" width="${bw}" height="${barH}" rx="3" fill="${barColor}" opacity="0.25"/>
        <rect x="${bx}" y="${barY}" width="${progW}" height="${barH}" rx="3" fill="${barColor}" opacity="0.9"/>
        <rect x="${bx}" y="${barY}" width="${bw}" height="${barH}" rx="3" fill="none" stroke="${borderColor}" stroke-width="${isCrit?1.5:1}"/>
        ${task.prog>10?`<text x="${bx+6}" y="${barY+barH/2+4}" font-family="var(--mono)" font-size="9" fill="rgba(255,255,255,0.85)">${task.prog}%</text>`:''}
        ${isCrit?`<rect x="${bx}" y="${barY}" width="${bw}" height="${barH}" rx="3" fill="url(#gcrit-pulse)" opacity="0.1"/>`:''}
      </g>`;
    } else if(isGroup){
      // Group summary bar (diamond endpoints)
      const ch=allTasks.filter(c=>c.parent===task.id&&!c.isGroup&&c.dur>0);
      if(ch.length){
        const gx=Math.min(...ch.map(c=>(c.ES||0)*DW));
        const gx2=Math.max(...ch.map(c=>((c.ES||0)+(c.dur||0))*DW));
        const midY=y+ROW_H/2;
        svgBars+=`<rect x="${gx}" y="${midY-5}" width="${gx2-gx}" height="5" rx="0" fill="var(--acc)" opacity="0.4"/>
        <polygon points="${gx},${midY-5} ${gx-7},${midY} ${gx},${midY+5}" fill="var(--acc)" opacity="0.7"/>
        <polygon points="${gx2},${midY-5} ${gx2+7},${midY} ${gx2},${midY+5}" fill="var(--acc)" opacity="0.7"/>`;
      }
    }
  });

  // Dependency arrows
  allTasks.forEach((task,ti)=>{
    if(!task.deps||task.isGroup)return;
    task.deps.forEach(depId=>{
      const depTask=taskMap[depId];
      if(!depTask||depTask.isGroup)return;
      const di=allTasks.indexOf(depTask);
      const fx=((depTask.ES||0)+(depTask.dur||0))*DW;
      const fy=di*ROW_H+ROW_H/2;
      const tx=(task.ES||0)*DW;
      const ty=ti*ROW_H+ROW_H/2;
      const mid=Math.max(fx+10,tx-20);
      const isCrit=task.isCritical&&depTask.isCritical;
      svgDeps+=`<path d="M${fx},${fy} H${mid} V${ty} H${tx}" fill="none"
        stroke="${isCrit?'var(--crit)':'rgba(61,139,255,0.4)'}"
        stroke-width="${isCrit?1.5:1}" stroke-dasharray="${isCrit?'none':'4,3'}"

    });

  // Week gridlines
  let weekLines='';
  weeks.forEach(w=>{
    weekLines+=`<line x1="${w*DW}" y1="0" x2="${w*DW}" y2="${SVG_H}" stroke="rgba(29,53,87,0.4)" stroke-width="0.5"/>`;
  });

  // Today line
  const todayLine=todayX>0&&todayX<svgW?`
    <line x1="${todayX}" y1="0" x2="${todayX}" y2="${SVG_H}" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="4,3"/>

  // Month header in SVG
  let monthHdr='';
  months.forEach((m,i)=>{
    monthHdr+=`
    <rect x="${m.x}" y="0" width="${m.w}" height="24" fill="${i%2===0?'rgba(255,255,255,0.02)':'rgba(255,255,255,0.01)'}"/>
    <text x="${m.x+m.w/2}" y="15" text-anchor="middle" font-family="var(--disp)" font-size="10" font-weight="700" fill="var(--txt3)" text-transform="uppercase">${m.label}</text>
    <line x1="${m.x}" y1="0" x2="${m.x}" y2="24" stroke="var(--bd)" stroke-width="0.5"/>`;
  });
  // Week numbers in header
  let weekHdr='';
  weeks.forEach(w=>{
    const weekNum=Math.floor(w/7)+1;
    weekHdr+=`<text x="${w*DW+2}" y="42" font-family="var(--mono)" font-size="8" fill="var(--txt3)">S${weekNum}</text>
    <line x1="${w*DW}" y1="24" x2="${w*DW}" y2="${HDR_H}" stroke="var(--bd)" stroke-width="0.5"/>`;
  });

  el.innerHTML=`
  <div class="sec-hdr">
    <div class="sec-title">Diagramma di Gantt</div>
    <div class="sec-actions">
      <button class="btn-sm ${S.ganttZoom===8?'active':''}" onclick="setGanttZoom(8)">–</button>
      <span style="font-size:11px;color:var(--txt2);font-family:var(--mono)">${DW}px/g</span>
      <button class="btn-sm ${S.ganttZoom===22?'active':''}" onclick="setGanttZoom(22)">+</button>
      <button class="btn-sm" onclick="setGanttZoom(14)">Reset</button>
    </div>
  </div>
  <div class="gantt-wrap" style="height:calc(100vh - 180px)">
    <div class="gantt-body" style="height:100%">
      <div class="gantt-sidebar" style="height:100%;overflow-y:auto;overflow-x:hidden">
        <div class="gantt-sidebar-hdr">Attività</div>
        ${sidebarRows}
      </div>
      <div class="gantt-chart-area" style="height:100%">
        <svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${SVG_H+HDR_H}" style="display:block;min-width:${svgW}px">
          <defs>
            <linearGradient id="ga" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3d8bff"/><stop offset="1" stop-color="#5a9fff"/></linearGradient>
            <linearGradient id="gd" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00c896"/><stop offset="1" stop-color="#00e5b0"/></linearGradient>
            <linearGradient id="gc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff4560"/><stop offset="1" stop-color="#ff6b6b"/></linearGradient>
            <marker id="arrN" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L6,3 L0,6 Z" fill="rgba(61,139,255,0.6)"/>
            </marker>
            <marker id="arrC" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L6,3 L0,6 Z" fill="var(--crit)"/>
            </marker>
          </defs>
          <!-- Header -->
          <g transform="translate(0,0)">
            ${monthHdr}
            ${weekHdr}
            <line x1="0" y1="${HDR_H}" x2="${svgW}" y2="${HDR_H}" stroke="var(--bd)" stroke-width="1"/>
          </g>
          <!-- Body -->
          <g transform="translate(0,${HDR_H})">
            ${weekLines}
            ${svgRows}
            ${svgDeps}
            ${svgBars}
            ${todayLine}
          </g>
        </svg>
      </div>
    </div>
  </div>`;

  // Sync sidebar and chart scroll
  const sidebar=el.querySelector('.gantt-sidebar');
  const chart=el.querySelector('.gantt-chart-area');
  chart.addEventListener('scroll',()=>{sidebar.scrollTop=chart.scrollTop},true);
  sidebar.addEventListener('scroll',()=>{chart.scrollTop=sidebar.scrollTop},true);
}

function getPertLayout(tasks){
  const levels={};
  const taskMap=Object.fromEntries(tasks.map(t=>[t.id,t]));
  function level(id){
    if(levels[id]!==undefined)return levels[id];
    const t=taskMap[id];
    if(!t||!t.deps||t.deps.length===0){levels[id]=0;return 0}
    const l=Math.max(...t.deps.map(d=>level(d)))+1;
    levels[id]=l;return l;
  }
  tasks.forEach(t=>level(t.id));
  const byLevel={};
  tasks.forEach(t=>{const l=levels[t.id];if(!byLevel[l])byLevel[l]=[];byLevel[l].push(t.id)});
  const NW=170,NH=92,HG=220,VG=120;
  const pos={};
  Object.keys(byLevel).sort((a,b)=>a-b).forEach(lv=>{
    const arr=byLevel[lv];
    arr.forEach((id,idx)=>{
      const maxInLevel=arr.length;
      pos[id]={x:parseInt(lv)*HG+20,y:idx*VG+20+(4-maxInLevel)*VG/2};
    });
  });
  const maxLevel=Math.max(...Object.keys(byLevel).map(Number));
  const maxStack=Math.max(...Object.values(byLevel).map(a=>a.length));
  return{pos,svgW:(maxLevel+1)*HG+NW+60,svgH:maxStack*VG+80,NW,NH};
}

function renderPERT(){
  const el=document.getElementById('view-pert');
  const leaves=S.tasks.filter(t=>!t.isGroup&&t.dur>0);
  const {pos,svgW,svgH,NW,NH}=getPertLayout(leaves);
  const taskMap=Object.fromEntries(leaves.map(t=>[t.id,t]));
  const critPath=S.criticalPath||[];
  const critIds=new Set(critPath.map(t=>t.id));

  // Edges
  let edges='';
  leaves.forEach(task=>{
    (task.deps||[]).forEach(depId=>{
      const dep=taskMap[depId];
      if(!dep)return;
      const sp=pos[depId],tp=pos[task.id];
      if(!sp||!tp)return;
      const isCrit=critIds.has(task.id)&&critIds.has(depId);
      const sx=sp.x+NW,sy=sp.y+NH/2;
      const tx=tp.x,ty=tp.y+NH/2;
      const cp1x=sx+(tx-sx)*0.5,cp1y=sy,cp2x=sx+(tx-sx)*0.5,cp2y=ty;
      edges+=`<path d="M${sx},${sy} C${cp1x},${cp1y} ${cp2x},${cp2y} ${tx},${ty}"
        fill="none" stroke="${isCrit?'var(--crit)':'rgba(61,139,255,0.35)'}"
        stroke-width="${isCrit?2:1.2}"
        marker-end="url(#pa${isCrit?'C':'N'})"
        ${isCrit?'filter="url(#glow-crit)"':''}/>`;
    });
  });

  // Nodes
  let nodes='';
  leaves.forEach(task=>{
    const p=pos[task.id];if(!p)return;
    const isCrit=critIds.has(task.id);
    const borderColor=isCrit?'var(--crit)':task.status==='done'?'#00c896':'rgba(61,139,255,0.5)';
    const borderW=isCrit?2:1;
    const bgColor=isCrit?'rgba(255,69,96,0.05)':task.status==='done'?'rgba(0,200,150,0.05)':'rgba(13,20,36,0.95)';
    const topColor=isCrit?'var(--crit)':task.status==='done'?'var(--ok)':'var(--acc)';
    const nameLen=15;
    const name=task.name.length>nameLen?task.name.substring(0,nameLen)+'…':task.name;
    const floatColor=task.float===0?'var(--crit)':task.float<3?'var(--warn)':'var(--ok)';

    nodes+=`
    <g class="pert-node-box" transform="translate(${p.x},${p.y})"
       onmouseenter="showTooltip(event,'${task.id}')" onmouseleave="hideTooltip()"
       onclick="openTaskModal('${task.id}')" style="cursor:pointer">
      ${isCrit?`<rect x="-2" y="-2" width="${NW+4}" height="${NH+4}" rx="7" fill="rgba(255,69,96,0.06)" stroke="rgba(255,69,96,0.2)" stroke-width="0.5"/>`:``}
      <rect width="${NW}" height="${NH}" rx="5" fill="${bgColor}" stroke="${borderColor}" stroke-width="${borderW}"/>
      <!-- Top bar -->
      <rect width="${NW}" height="22" rx="5" fill="${topColor}" opacity="0.12"/>
      <rect y="17" width="${NW}" height="5" fill="${topColor}" opacity="0.05"/>
      <!-- ES | EF row -->
      <text x="8" y="15" font-family="var(--mono)" font-size="9" font-weight="600" fill="${topColor}">ES:${task.ES??'–'}</text>
      <text x="${NW/2}" y="15" text-anchor="middle" font-family="var(--disp)" font-size="9" font-weight="700" fill="rgba(255,255,255,0.4)">${task.id.toUpperCase()}</text>
      <text x="${NW-8}" y="15" text-anchor="end" font-family="var(--mono)" font-size="9" font-weight="600" fill="${topColor}">EF:${task.EF??'–'}</text>
      <!-- Divider -->
      <line x1="0" y1="22" x2="${NW}" y2="22" stroke="${borderColor}" stroke-opacity="0.4"/>
      <!-- Name -->
      <text x="${NW/2}" y="38" text-anchor="middle" font-family="var(--disp)" font-size="11" font-weight="700" fill="rgba(255,255,255,0.9)">${name}</text>
      <text x="${NW/2}" y="51" text-anchor="middle" font-family="var(--sans)" font-size="9" fill="var(--txt2)">${task.dur}gg · ${task.resp}</text>
      <!-- Progress bar -->
      <rect x="8" y="57" width="${NW-16}" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="8" y="57" width="${Math.max((NW-16)*task.prog/100,0)}" height="4" rx="2" fill="${topColor}" opacity="0.7"/>
      <!-- Divider -->
      <line x1="0" y1="65" x2="${NW}" y2="65" stroke="${borderColor}" stroke-opacity="0.4"/>
      <!-- LS | Float | LF row -->
      <text x="8" y="79" font-family="var(--mono)" font-size="9" fill="var(--txt2)">LS:${task.LS??'–'}</text>
      <text x="${NW/2}" y="79" text-anchor="middle" font-family="var(--mono)" font-size="9" font-weight="700" fill="${floatColor}">F:${task.float??'–'}</text>
      <text x="${NW-8}" y="79" text-anchor="end" font-family="var(--mono)" font-size="9" fill="var(--txt2)">LF:${task.LF??'–'}</text>
      <!-- Status dot -->
      <circle cx="${NW-10}" cy="12" r="3" fill="${task.status==='done'?'var(--ok)':task.status==='active'?'var(--acc)':'var(--txt3)'}"/>
    </g>`;
  });

  // Critical path text
  const cpText=critPath.map(t=>`<span class="cpm-node">${t.wbs} ${t.name}</span>`).join('<span class="arrow-sep">→</span>');

  el.innerHTML=`
  <div class="sec-hdr">
    <div class="sec-title">Rete PERT & Critical Path Method</div>
    <div class="sec-actions">
      <span style="font-family:var(--mono);font-size:10px;color:var(--txt2)">Durata Progetto: <b style="color:var(--txtw)">${S.projectDuration} gg</b></span>
    </div>
  </div>
  <div class="pert-wrap" style="height:calc(100vh - 180px);display:flex;flex-direction:column">
    <div class="pert-toolbar">
      <div class="cpm-summary" style="padding:0;background:none;border:none;flex:1">
        <div class="cpm-stat"><div class="cpm-stat-val">${S.projectDuration}</div><div class="cpm-stat-lbl">Giorni Totali</div></div>
        <div style="width:1px;height:32px;background:var(--bd)"></div>
        <div class="cpm-stat"><div class="cpm-stat-val" style="color:var(--crit)">${critPath.length}</div><div class="cpm-stat-lbl">Attività Critiche</div></div>
        <div style="width:1px;height:32px;background:var(--bd)"></div>
        <div class="cpm-stat"><div class="cpm-stat-val" style="color:var(--ok)">${leaves.length-critPath.length}</div><div class="cpm-stat-lbl">Con Float</div></div>
        <div style="width:1px;height:32px;background:var(--bd);"></div>
        <div style="flex:1;padding:0 16px">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-bottom:4px">Percorso Critico</div>
          <div class="cpm-path">${cpText||'—'}</div>
        </div>
      </div>
      <div class="pert-legend">
        <div class="legend-item"><div class="legend-box" style="border-color:var(--crit);background:rgba(255,69,96,0.1)"></div>Critico (Float=0)</div>
        <div class="legend-item"><div class="legend-box" style="border-color:var(--acc);background:rgba(61,139,255,0.1)"></div>Non Critico</div>
        <div class="legend-item"><div class="legend-box" style="border-color:var(--ok);background:rgba(0,200,150,0.1)"></div>Completato</div>
      </div>
    </div>
    <div class="pert-svg-area" style="flex:1">
      <svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" style="min-width:${svgW}px;min-height:${svgH}px;padding:20px;display:block">
        <defs>
          <marker id="paN" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="rgba(61,139,255,0.5)"/>
          </marker>
          <marker id="paC" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 Z" fill="var(--crit)"/>
          </marker>
          <filter id="glow-crit">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        ${edges}
        ${nodes}
      </svg>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  TASKS TABLE
// ═══════════════════════════════════════════════════════
function renderTasksTable(){
  const el=document.getElementById('view-tasks');
  const leaves=S.tasks.filter(t=>!t.isGroup);
  const rows=leaves.map(t=>`
    <tr class="${t.isCritical?'critical-row':''}" onclick="openTaskModal('${t.id}')">
      <td class="mono" style="color:var(--txt3)">${t.wbs}</td>
      <td><span class="${t.isCritical?'crit':''}">${t.name}</span>${t.isCritical?'&nbsp;<span class="tag tag-critical" style="font-size:9px">CPM</span>':''}</td>
      <td class="mono">${t.dur}gg</td>
      <td><span class="tag ${t.status==='done'?'tag-done':t.status==='active'?'tag-active':'tag-pending'}">${t.status==='done'?'Completato':t.status==='active'?'In Corso':'In Attesa'}</span></td>
      <td>
        <div class="prog-cell">
          <div class="prog-bar"><div class="prog-fill" style="width:${t.prog}%"></div></div>
          <div class="prog-pct">${t.prog}%</div>
        </div>
      </td>
      <td class="mono" style="color:var(--txt2)">ES:${t.ES??'–'} EF:${t.EF??'–'}</td>
      <td class="mono" style="color:${t.float===0?'var(--crit)':t.float<3?'var(--warn)':'var(--ok)'}">${t.float??'–'}</td>
      <td>${t.resp||'—'}</td>
      <td class="mono">€${(t.cost||0).toLocaleString('it-IT')}</td>
      <td onclick="event.stopPropagation()">
        <div class="action-btns">
          <button class="abtn" onclick="openTaskModal('${t.id}')">✎ Edit</button>
          <button class="abtn del" onclick="deleteTask('${t.id}')">✕ Del</button>
        </div>
      </td>
    </tr>`).join('');

  el.innerHTML=`
  <div style="max-width:1280px;margin:0 auto">
    <div class="tasks-toolbar">
      <div class="sec-title">Registro Attività</div>
      <div class="sec-actions">
        <div class="search-box">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--txt3)" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
          <input type="text" placeholder="Cerca attività…" oninput="filterTasks(this.value)" id="task-search">
        </div>
        <button class="btn-sm" onclick="openTaskModal(null)">+ Nuova</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="tasks-tbl">
        <thead>
          <tr>
            <th>WBS</th>
            <th>Nome Attività</th>
            <th>Durata</th>
            <th>Stato</th>
            <th style="min-width:120px">Avanzamento</th>
            <th>ES / EF</th>
            <th>Float</th>
            <th>Responsabile</th>
            <th>Costo</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="tasks-tbody">${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function filterTasks(q){
  const rows=document.querySelectorAll('#tasks-tbody tr');
  rows.forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// ═══════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════
function showTooltip(e,taskId){
  const t=S.tasks.find(x=>x.id===taskId);
  if(!t)return;
  const tt=document.getElementById('tooltip');
  tt.innerHTML=`<div class="tt-title">${t.name}</div>
    <div class="tt-row"><span class="tt-key">WBS</span><span class="tt-val">${t.wbs}</span></div>
    <div class="tt-row"><span class="tt-key">Durata</span><span class="tt-val">${t.dur} giorni</span></div>
    <div class="tt-row"><span class="tt-key">ES / EF</span><span class="tt-val">${t.ES??'–'} / ${t.EF??'–'}</span></div>
    <div class="tt-row"><span class="tt-key">LS / LF</span><span class="tt-val">${t.LS??'–'} / ${t.LF??'–'}</span></div>
    <div class="tt-row"><span class="tt-key">Float</span><span class="tt-val" style="color:${t.float===0?'var(--crit)':'var(--ok)'}">${t.float??'–'}${t.isCritical?' ⚡':''}</span></div>
    <div class="tt-row"><span class="tt-key">Avanzamento</span><span class="tt-val">${t.prog}%</span></div>
    <div class="tt-row"><span class="tt-key">Responsabile</span><span class="tt-val">${t.resp||'—'}</span></div>
    <div class="tt-row"><span class="tt-key">Costo</span><span class="tt-val">€${(t.cost||0).toLocaleString('it-IT')}</span></div>`;
  tt.classList.add('show');
  moveTip(e);
}
function moveTip(e){
  const tt=document.getElementById('tooltip');
  const x=Math.min(e.clientX+16,window.innerWidth-tt.offsetWidth-10);
  const y=Math.min(e.clientY+12,window.innerHeight-tt.offsetHeight-10);
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function hideTooltip(){document.getElementById('tooltip').classList.remove('show')}
document.addEventListener('mousemove',e=>{
  if(document.getElementById('tooltip').classList.contains('show'))moveTip(e);
});

// ═══════════════════════════════════════════════════════
//  TASK MODAL
// ═══════════════════════════════════════════════════════
function openTaskModal(id){
  S.editingId=id;
  const modal=document.getElementById('modal-task');
  const otherModal=document.getElementById('modal-project');
  modal.style.display='';
  otherModal.style.display='none';

  // Populate parent select
  const sel=document.getElementById('f-parent');
  sel.innerHTML='<option value="">— Nessuno (radice) —</option>';
  S.tasks.filter(t=>t.id!==id).forEach(t=>{
    sel.innerHTML+=`<option value="${t.id}">${t.wbs} ${t.name}</option>`;
  });

  // Deps hint
  const hints=S.tasks.map(t=>`${t.id}=${t.name}`).join(', ');
  document.getElementById('f-deps-hint').textContent='IDs disponibili: '+S.tasks.map(t=>t.id).join(', ');

  document.getElementById('modal-task-title').textContent=id?'Modifica Attività':'Nuova Attività';

  if(id){
    const t=S.tasks.find(x=>x.id===id);
    if(!t)return;
    document.getElementById('f-name').value=t.name||'';
    document.getElementById('f-wbs').value=t.wbs||'';
    document.getElementById('f-parent').value=t.parent||'';
    document.getElementById('f-dur').value=t.dur||0;
    document.getElementById('f-prog').value=t.prog||0;
    document.getElementById('f-resp').value=t.resp||'';
    document.getElementById('f-cost').value=t.cost||0;
    document.getElementById('f-deps').value=(t.deps||[]).join(', ');
    document.getElementById('f-status').value=t.status||'pending';
    document.getElementById('f-res').value=t.res||'';
    document.getElementById('f-isgroup').value=t.isGroup?'true':'false';
  } else {
    document.getElementById('f-name').value='';
    document.getElementById('f-wbs').value='';
    document.getElementById('f-parent').value='';
    document.getElementById('f-dur').value='5';
    document.getElementById('f-prog').value='0';
    document.getElementById('f-resp').value='';
    document.getElementById('f-cost').value='0';
    document.getElementById('f-deps').value='';
    document.getElementById('f-status').value='pending';
    document.getElementById('f-res').value='';
    document.getElementById('f-isgroup').value='false';
  }
  document.getElementById('overlay').classList.add('open');
}

function saveTask(){
  const id=S.editingId;
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Nome obbligatorio');return}
  const deps=document.getElementById('f-deps').value.split(',').map(s=>s.trim()).filter(Boolean);
  const task={
    id:id||(Date.now().toString(36)),
    name,
    wbs:document.getElementById('f-wbs').value.trim(),
    parent:document.getElementById('f-parent').value||null,
    dur:parseInt(document.getElementById('f-dur').value)||0,
    prog:Math.min(100,Math.max(0,parseInt(document.getElementById('f-prog').value)||0)),
    resp:document.getElementById('f-resp').value.trim(),
    cost:parseInt(document.getElementById('f-cost').value)||0,
    deps,
    status:document.getElementById('f-status').value,
    res:document.getElementById('f-res').value.trim(),
    isGroup:document.getElementById('f-isgroup').value==='true'
  };
  if(id){
    const idx=S.tasks.findIndex(t=>t.id===id);
    if(idx>=0)S.tasks[idx]={...S.tasks[idx],...task};
  } else {
    S.tasks.push(task);
  }
  closeModal();
  runCPM();
  render();
}

function deleteTask(id){
  if(!confirm('Eliminare questa attività?'))return;
  S.tasks=S.tasks.filter(t=>t.id!==id);
  // Remove from deps
  S.tasks.forEach(t=>{t.deps=(t.deps||[]).filter(d=>d!==id)});
  runCPM();
  render();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  S.editingId=null;
}

// ═══════════════════════════════════════════════════════
//  PROJECT MODAL
// ═══════════════════════════════════════════════════════
function openProjectModal(){
  const p=S.project;
  document.getElementById('modal-task').style.display='none';
  document.getElementById('modal-project').style.display='';
  document.getElementById('p-name').value=p.name;
  document.getElementById('p-client').value=p.client;
  document.getElementById('p-manager').value=p.manager;
  document.getElementById('p-desc').value=p.description;
  document.getElementById('p-start').value=p.startDate;
  document.getElementById('p-budget').value=p.budget;
  document.getElementById('p-spent').value=p.spent;
  document.getElementById('p-status').value=p.status;
  document.getElementById('overlay').classList.add('open');
}

function saveProject(){
  S.project={
    ...S.project,
    name:document.getElementById('p-name').value.trim()||S.project.name,
    client:document.getElementById('p-client').value.trim(),
    manager:document.getElementById('p-manager').value.trim(),
    description:document.getElementById('p-desc').value.trim(),
    startDate:document.getElementById('p-start').value||S.project.startDate,
    budget:parseInt(document.getElementById('p-budget').value)||S.project.budget,
    spent:parseInt(document.getElementById('p-spent').value)||S.project.spent,
    status:document.getElementById('p-status').value
  };
  closeModal();
  runCPM();
  render();
}

// ═══════════════════════════════════════════════════════
//  IMPORT / EXPORT
// ═══════════════════════════════════════════════════════
function exportJSON(){
  const data={project:S.project,tasks:S.tasks,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ProjecTrak_${S.project.id}_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function importJSON(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.project)S.project=data.project;
      if(data.tasks&&Array.isArray(data.tasks))S.tasks=data.tasks;
      runCPM();
      render();
      alert('Progetto importato con successo!');
    }catch(err){alert('Errore nel file JSON: '+err.message)}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
document.getElementById('main-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(!btn)return;
  S.view=btn.dataset.view;
  render();
});

document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))closeModal();
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='n'&&e.ctrlKey){e.preventDefault();openTaskModal(null)}
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
(function init(){
  // Load from localStorage
  const saved=localStorage.getItem('projectrak_data');
  if(saved){
    try{const d=JSON.parse(saved);if(d.project)S.project=d.project;if(d.tasks)S.tasks=d.tasks}
    catch(e){}
  }

  // Auto-save
  setInterval(()=>{
    localStorage.setItem('projectrak_data',JSON.stringify({project:S.project,tasks:S.tasks}));
  },5000);

  runCPM();
  render();

  // Animate bars in dashboard after render
  setTimeout(()=>{
    document.querySelectorAll('.gmr-bar[data-target]').forEach(b=>{
      b.style.width=b.dataset.target+'%';
    });
  },300);

  // Console info
  console.log('%cProjecTrak™ PM Suite','color:#3d8bff;font-size:18px;font-weight:bold');
  console.log('CPM computed. Critical path:',S.criticalPath?.map(t=>t.name).join(' → '));
  console.log('Project duration:',S.projectDuration,'days');
})();
</script>
